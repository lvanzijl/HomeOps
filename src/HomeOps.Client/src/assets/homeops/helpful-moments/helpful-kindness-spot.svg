<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" role="img" aria-labelledby="title desc" data-asset-name="helpful-kindness" data-asset-variant="spot" data-intended-size="96px" data-color-slots="Primary Secondary Accent Highlight Shadow Background MemberColor">
<title>helpful-kindness spot</title>
<desc>HomeOps owned spot asset for helpful-kindness; uses semantic color slots and rounded layered shapes.</desc>
<style>:root{--asset-primary:#f4a6a6;--asset-secondary:#f8dd9f;--asset-accent:#596f8f;--asset-highlight:#fff8df;--asset-shadow:#8a7a641f;--asset-background:#f7efe7;--asset-neutral-warm:#fff4df;--asset-member-color:#91c7b1}.primary{fill:var(--asset-primary,currentColor)}.secondary{fill:var(--asset-secondary,currentColor)}.accent{fill:var(--asset-accent,currentColor)}.highlight{fill:var(--asset-highlight,#fff)}.shadow{fill:var(--asset-shadow,rgba(0,0,0,.12))}.background{fill:var(--asset-background,transparent)}.neutral{fill:var(--asset-neutral-warm,#fff4df)}.member{fill:var(--asset-member-color,var(--asset-secondary,currentColor))}.stroke{stroke:var(--asset-accent,currentColor);stroke-linecap:round;stroke-linejoin:round;fill:none}</style>
