services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: homeops
      POSTGRES_USER: homeops
      POSTGRES_PASSWORD: homeops_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U homeops -d homeops"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
